<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scentique — My Account</title>
  <link rel="stylesheet" href="Style.css" />

  <style>
    body {
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
    }

    .navbar.solid {
      box-shadow: none;
    }

    .navbar .nav-left a:first-child {
      text-decoration: underline;
    }

    .navbar .nav-search {
      width: auto;
      height: auto;
      border: 1.5px solid #68737a !important;
      border-radius: 20px !important;
      background: #fff !important;
      color: #777 !important;
      padding: 6px 14px !important;
      justify-content: flex-start;
      font-size: 13px !important;
    }

    .navbar .nav-search svg {
      width: 14px;
      height: 14px;
      stroke-width: 2;
    }

    .navbar .nav-right .nav-icon,
    .navbar .nav-right .nav-icon svg,
    .navbar .nav-right .nav-icon svg path,
    .navbar .nav-right .nav-icon svg circle,
    .navbar .nav-right .nav-icon svg line {
      color: #000 !important;
      stroke: #000 !important;
    }

    .breadcrumb {
      padding: calc(var(--nav-h) + 28px) 36px 0;
      display: flex;
      gap: 14px;
      align-items: center;
      color: #7d4f45;
      font-size: 16px;
    }

    .breadcrumb a,
    .breadcrumb span {
      color: #7d4f45;
    }

    .breadcrumb a {
      text-decoration: none;
    }

    .breadcrumb span,
    .breadcrumb a:last-child {
      text-decoration: underline;
    }

    .account-page {
      max-width: 980px;
      margin: 0 auto;
      padding: 118px 32px 80px;
    }

    .account-menu {
      display: grid;
      grid-template-columns: repeat(3, 220px);
      justify-content: center;
      gap: 34px;
    }

    .account-card {
      height: 220px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .account-card:hover {
      transform: translateY(-2px);
      border-color: #d17bc5;
    }

    .account-card svg {
      width: 96px;
      height: 96px;
    }

    .account-card span {
      font-size: 31px;
      font-weight: 300;
      line-height: 1;
    }

    .profile-panel {
      max-width: 470px;
      min-height: 620px;
      margin: 0 auto;
      border: 3px solid #777;
      padding: 38px 56px;
    }

    .profile-panel h1 {
      font-family: Georgia, "Times New Roman", serif;
      text-align: center;
      font-size: 30px;
      margin-bottom: 42px;
    }

    .profile-form {
      display: grid;
      gap: 26px;
    }

    .profile-field label {
      display: block;
      margin: 0 0 -2px 18px;
      font-size: 14px;
      color: #222;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 30px;
      gap: 12px;
      align-items: center;
    }

    .field-row input {
      width: 100%;
      height: 44px;
      border: 2px solid #65727a;
      border-radius: 999px;
      padding: 0 20px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    .field-row input:focus {
      border-color: #d17bc5;
    }

    .field-icon {
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      border: none;
    }

    .field-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }

    .save-btn {
      width: 246px;
      height: 56px;
      margin: 56px auto 0;
      display: block;
      border: 2px solid #000;
      border-radius: 999px;
      background: #d17bc5;
      color: #fff;
      font-size: 23px;
      font-weight: 300;
      cursor: pointer;
    }

    .save-btn:hover {
      filter: brightness(1.03);
    }

    .logout-profile-btn {
      width: 246px;
      height: 46px;
      margin: 14px auto 0;
      display: block;
      border: 2px solid #000;
      border-radius: 999px;
      background: #fff;
      color: #000;
      font-size: 18px;
      cursor: pointer;
    }

    .logout-profile-btn:hover {
      background: #f6f6f6;
    }

    .form-message {
      min-height: 22px;
      text-align: center;
      font-weight: 700;
      margin-top: 16px;
    }

    .success {
      color: #00a852;
    }

    .error {
      color: #d93025;
    }

    .account-actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .account-home-actions {
      margin-top: 34px;
      display: flex;
      justify-content: center;
    }

    .text-btn {
      border: none;
      background: none;
      color: #7d4f45;
      text-decoration: underline;
      cursor: pointer;
      font-size: 14px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    @media (max-width: 920px) {
      .account-menu {
        grid-template-columns: repeat(2, minmax(180px, 220px));
      }

      .account-page {
        padding-left: 24px;
        padding-right: 24px;
      }
    }

    @media (max-width: 680px) {
      .account-page {
        padding: calc(var(--nav-h) + 34px) 20px 54px;
      }

      .account-menu {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .account-card {
        width: min(280px, 100%);
        justify-self: center;
      }

      .profile-panel {
        padding: 30px 24px;
        min-height: 0;
      }

      .form-line {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .account-actions {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar solid dark-text">
    <div class="nav-left">
      <a href="shop.html">Shop</a>
      <a href="shop.html?sale=1">Sale</a>
    </div>

    <a class="nav-logo" href="index.html">Scentique</a>

    <div class="nav-right">
      <button class="nav-search open-search" type="button">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <span>Search Perfume</span>
      </button>

      <a href="account.html" class="nav-icon" title="Account">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
        </svg>
      </a>

      <a href="cart.html" class="nav-icon" title="Cart">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        <span class="cart-badge"></span>
      </a>
    </div>
  </nav>

  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html">Home</a>
    <span>/</span>
    <a href="account.html">My Account</a>
  </div>

  <main class="account-page">
    <section class="view active" id="accountHome">
      <div class="account-menu">
        <a class="account-card" href="cart.html">
          <svg viewBox="0 0 180 150" fill="none" aria-hidden="true">
            <path d="M30 28h18c12 0 17 7 18 18l9 67c2 13 10 21 24 21h48" stroke="#ad4e78" stroke-width="12" stroke-linecap="round"></path>
            <path d="M68 53h83l-10 48c-2 12-8 17-20 17H78" stroke="#ad4e78" stroke-width="12" stroke-linejoin="round"></path>
            <path d="M78 74h65M84 96h50M98 55l6 61M126 55l-6 61" stroke="#ad4e78" stroke-width="9"></path>
            <circle cx="94" cy="138" r="9" fill="#ad4e78"></circle>
            <circle cx="142" cy="138" r="9" fill="#ad4e78"></circle>
          </svg>
          <span>My Cart</span>
        </a>

        <a class="account-card" href="orders.html">
          <svg viewBox="0 0 160 160" fill="none" aria-hidden="true">
            <rect x="36" y="28" width="88" height="104" rx="8" stroke="#ad4e78" stroke-width="10"></rect>
            <path d="M58 58h44M58 80h44M58 102h28" stroke="#ad4e78" stroke-width="8" stroke-linecap="round"></path>
            <circle cx="111" cy="108" r="22" fill="#d77aa4"></circle>
            <path d="m101 108 7 7 14-16" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span>My Orders</span>
        </a>

        <button class="account-card" type="button" onclick="showProfile()">
          <svg viewBox="0 0 160 160" fill="none" aria-hidden="true">
            <circle cx="80" cy="80" r="68" fill="#d77aa4"></circle>
            <circle cx="80" cy="57" r="24" fill="#aa4d7d"></circle>
            <path d="M34 126c10-31 32-43 46-43s36 12 46 43c-13 14-29 21-46 21s-33-7-46-21z" fill="#aa4d7d"></path>
          </svg>
          <span>Manage Profile</span>
        </button>
      </div>

      <div class="account-home-actions">
        <button class="logout-profile-btn" type="button" onclick="logout()">Logout</button>
      </div>
    </section>

    <section class="view" id="profileView">
      <form class="profile-panel" id="profileForm">
        <h1>Manage Profile</h1>

        <div class="profile-form">
          <div class="profile-field">
            <label for="email">E-mail address</label>
            <div class="field-row">
              <input id="email" type="email" autocomplete="email" />
              <span class="field-icon" aria-hidden="true">
                <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M12 20h9"></path>
                  <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"></path>
                </svg>
              </span>
            </div>
          </div>

          <div class="profile-field">
            <label for="username">Username</label>
            <div class="field-row">
              <input id="username" type="text" autocomplete="username" />
              <span class="field-icon" aria-hidden="true">
                <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M12 20h9"></path>
                  <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"></path>
                </svg>
              </span>
            </div>
          </div>

          <div class="profile-field">
            <label for="phone">Phone number</label>
            <div class="field-row">
              <input id="phone" type="tel" autocomplete="tel" />
              <span class="field-icon" aria-hidden="true">
                <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M12 20h9"></path>
                  <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"></path>
                </svg>
              </span>
            </div>
          </div>

          <div class="profile-field">
            <label for="oldPassword">Old password</label>
            <div class="field-row">
              <input id="oldPassword" type="password" autocomplete="current-password" placeholder="xxxxxxxxx" />
              <button class="field-icon" type="button" onclick="togglePassword('oldPassword')" aria-label="Show old password">
                <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M3 3l18 18"></path>
                  <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
                  <path d="M9.9 4.2A10 10 0 0 1 12 4c5 0 9 4.5 10 8-0.4 1.4-1.3 2.8-2.5 4"></path>
                  <path d="M6.1 6.1C4.1 7.5 2.8 9.7 2 12c1 3.5 5 8 10 8 1.7 0 3.3-.5 4.7-1.3"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="profile-field">
            <label for="newPassword">New password</label>
            <div class="field-row">
              <input id="newPassword" type="password" autocomplete="new-password" placeholder="xxxxxxxxx" />
              <button class="field-icon" type="button" onclick="togglePassword('newPassword')" aria-label="Show new password">
                <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M3 3l18 18"></path>
                  <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
                  <path d="M9.9 4.2A10 10 0 0 1 12 4c5 0 9 4.5 10 8-0.4 1.4-1.3 2.8-2.5 4"></path>
                  <path d="M6.1 6.1C4.1 7.5 2.8 9.7 2 12c1 3.5 5 8 10 8 1.7 0 3.3-.5 4.7-1.3"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <button class="save-btn" type="submit">Save changes</button>
        <button class="logout-profile-btn" type="button" onclick="logout()">Logout</button>
        <p class="form-message" id="profileMessage"></p>
      </form>

      <div class="account-actions">
        <button class="text-btn" type="button" onclick="showAccountHome()">Back to My Account</button>
      </div>
    </section>
  </main>

  <div class="search-overlay" id="searchOverlay">
    <span class="search-close" id="searchClose">✕</span>
    <input type="text" id="searchInput" placeholder="Search perfumes..." />
  </div>

  <script src="main.js"></script>
  <script>
    const accountHome = document.getElementById("accountHome");
    const profileView = document.getElementById("profileView");
    const breadcrumb = document.getElementById("breadcrumb");
    const profileForm = document.getElementById("profileForm");
    const profileMessage = document.getElementById("profileMessage");

    let currentUser = Auth.current();

    if (!currentUser) {
      window.location.href = "Login.html";
    } else {
      fillProfile();
      Cart.syncBadge();
    }

    function showProfile() {
      accountHome.classList.remove("active");
      profileView.classList.add("active");
      breadcrumb.innerHTML = `
        <a href="index.html">Home</a>
        <span>/</span>
        <a href="account.html">My Account</a>
        <span>/</span>
        <a href="account.html?view=profile">Manage Profile</a>
      `;
    }

    function showAccountHome() {
      profileView.classList.remove("active");
      accountHome.classList.add("active");
      breadcrumb.innerHTML = `
        <a href="index.html">Home</a>
        <span>/</span>
        <a href="account.html">My Account</a>
      `;
    }

    function fillProfile() {
      currentUser = Auth.current();
      document.getElementById("email").value = currentUser.email || "";
      document.getElementById("username").value = currentUser.username || "";
      document.getElementById("phone").value = currentUser.phone || "";
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }

    function showMessage(text, type) {
      profileMessage.textContent = text;
      profileMessage.className = `form-message ${type}`;
    }

    profileForm.addEventListener("submit", event => {
      event.preventDefault();
      const email = document.getElementById("email").value.trim();
      const username = document.getElementById("username").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const oldPassword = document.getElementById("oldPassword").value;
      const newPassword = document.getElementById("newPassword").value;

      if (!email || !username) {
        showMessage("Email and username are required.", "error");
        return;
      }

      const users = JSON.parse(localStorage.getItem("scentique_users") || "[]");
      const session = Auth.current();
      const userIndex = users.findIndex(user => user.email === session.email);

      if (users.some((user, index) => user.email === email && index !== userIndex)) {
        showMessage("That email is already registered.", "error");
        return;
      }

      if (newPassword) {
        if (!oldPassword) {
          showMessage("Enter your old password before setting a new one.", "error");
          return;
        }

        if (oldPassword !== session.password) {
          showMessage("Old password is incorrect.", "error");
          return;
        }

        if (newPassword.length < 6) {
          showMessage("New password must be at least 6 characters.", "error");
          return;
        }
      }

      const updates = { email, username, phone };
      if (newPassword) updates.password = newPassword;

      if (userIndex > -1) {
        Object.assign(users[userIndex], updates);
        localStorage.setItem("scentique_users", JSON.stringify(users));
      }

      Object.assign(session, updates);
      localStorage.setItem("scentique_session", JSON.stringify(session));
      document.getElementById("oldPassword").value = "";
      document.getElementById("newPassword").value = "";
      fillProfile();
      showMessage("Profile updated successfully.", "success");
    });

    function logout() {
      Auth.logout();
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get("view") === "profile") showProfile();
  </script>
</body>
</html>
