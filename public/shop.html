<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scentique — Shop</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #ffffff;
      color: #111;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      height: 64px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-left a {
      color: #111;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0;
    }

    .nav-left a.active {
      text-decoration: underline;
    }

    .nav-logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -2px;
      color: #000;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-search {
      width: auto;
      height: auto;
      border: 1px solid #6f7f8a;
      border-radius: 20px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      color: #777;
      cursor: pointer;
      font-size: 13px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .nav-search svg {
      width: 14px;
      height: 14px;
      stroke-width: 2;
    }

    .nav-search input {
      border: none;
      outline: none;
      width: 120px;
      font-size: 13px;
      font-family: Arial, Helvetica, sans-serif;
      background: transparent;
      cursor: pointer;
    }

    .nav-icon {
      color: #111;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      position: relative;
    }

    .nav-icon svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.8;
    }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      min-width: 17px;
      height: 17px;
      padding: 0 5px;
      border-radius: 999px;
      background: #e05b8a;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
    }

    .cart-badge.show {
      display: flex;
    }

    /* ===== SHOP LAYOUT ===== */
    .shop-shell {
      width: 100%;
      max-width: 1260px;
      margin: 0 auto;
      padding: 22px 30px 64px;
      display: grid;
      grid-template-columns: 260px minmax(0, 900px);
      column-gap: 64px;
      align-items: start;
    }

    .shop-sidebar {
      padding-top: 4px;
    }

    .breadcrumb {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      color: #7d4f45;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 82px;
      white-space: nowrap;
    }

    .breadcrumb a {
      color: #7d4f45;
      text-decoration: none;
    }

    .breadcrumb a.active {
      text-decoration: underline;
    }

    .scent-list {
      list-style: none;
      width: 100%;
      max-width: 245px;
    }

    .scent-list a {
      height: 52px;
      border-top: 1px solid #b6b6b6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      font-size: 23px;
      font-weight: 400;
      text-decoration: none;
    }

    .scent-list a.active {
      text-decoration: underline;
      text-underline-offset: 5px;
    }

    .scent-list li:last-child a {
      border-bottom: 1px solid #b6b6b6;
    }

    .shop-content {
      min-width: 0;
      max-width: 900px;
    }

    .shop-banner {
      width: 100%;
      height: 128px;
      border-radius: 7px;
      overflow: hidden;
      margin: 6px 0 34px;
      background: #d8eff1;
    }

    .shop-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ===== PRODUCT GRID ===== */
    .products-grid {
      width: 100%;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(3, 240px);
      justify-content: space-between;
      column-gap: 54px;
      row-gap: 48px;
    }

    .product-card {
      width: 240px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .product-card-inner {
      width: 240px;
      height: 218px;
      background: #e6e6e6;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .product-card-inner:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.10);
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .product-popup {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 12px);
      transform: translateX(-50%) translateY(8px);
      width: 230px;
      padding: 12px 14px;
      border: 1.5px solid #111;
      border-radius: 8px;
      background: #fff;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.35;
      text-align: left;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.13);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 20;
    }

    .product-popup strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      text-transform: lowercase;
    }

    .product-card:hover .product-popup {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .product-info {
      width: 100%;
      min-height: 142px;
      padding: 0 2px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .product-name {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.08;
      text-transform: lowercase;
      color: #111;
      text-decoration: none;
      min-height: 26px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .product-type {
      font-size: 20px;
      font-weight: 400;
      color: #111;
      line-height: 1.05;
      margin-top: 2px;
      min-height: 27px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .product-price {
      font-size: 20px;
      font-weight: 400;
      color: #111;
      line-height: 1.05;
      margin-top: 1px;
    }

    .product-price.sale-price {
      display: grid;
      gap: 2px;
      justify-items: center;
    }

    .product-price-old {
      color: #777;
      text-decoration: line-through;
      font-size: 15px;
    }

    .product-price-new {
      color: #b62d2d;
      font-size: 21px;
      font-weight: 700;
    }

    .discount-badge {
      color: #0a7f41;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 800;
    }

    .btn-cart {
      width: 194px;
      height: 39px;
      background: #fff;
      color: #111;
      border: 1.5px solid #777;
      border-radius: 999px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-weight: 400;
      cursor: pointer;
      margin-top: auto;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .btn-cart:hover {
      background: #f4f4f4;
      border-color: #555;
    }

    .btn-cart:disabled {
      border-color: #c4c4c4;
      background: #eeeeee;
      color: #777;
      cursor: not-allowed;
    }

    .btn-cart:disabled:hover {
      background: #eeeeee;
      border-color: #c4c4c4;
    }

    .product-stock {
      min-height: 18px;
      margin: 5px 0 8px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      color: #05bd55;
    }

    .product-stock.out {
      color: #b62d2d;
    }

    .status-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      font-size: 16px;
      color: #333;
    }

    .results-count {
      margin-top: 48px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
    }

    .chat-widget {
      position: fixed;
      top: 78px;
      right: 34px;
      width: min(360px, calc(100vw - 28px));
      background: #fff;
      border: 2px solid #111;
      border-radius: 18px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.14);
      z-index: 9000;
      overflow: hidden;
      display: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    .chat-widget.open {
      display: block;
    }

    .chat-head {
      min-height: 56px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #ddd;
      font-weight: 900;
      font-size: 18px;
    }

    .chat-close {
      border: none;
      font-size: 24px;
      line-height: 1;
    }

    .chat-body {
      height: 220px;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 14px;
    }

    .chat-message {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.35;
    }

    .chat-message.bot {
      align-self: flex-start;
      background: #f1f1f1;
    }

    .chat-message.user {
      align-self: flex-end;
      background: #000;
      color: #fff;
    }

    .chat-form {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #ddd;
    }

    .chat-form input {
      flex: 1;
      min-width: 0;
      border: 1.5px solid #777;
      border-radius: 999px;
      padding: 9px 12px;
      outline: none;
    }

    .chat-form button {
      border: 1.5px solid #111;
      border-radius: 999px;
      padding: 0 14px;
      font-weight: 800;
    }

    /* ===== SEARCH OVERLAY ===== */
    .search-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.97);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 30px;
    }

    .search-overlay.open {
      display: flex;
    }

    .search-close {
      position: absolute;
      top: 28px;
      right: 36px;
      font-size: 30px;
      cursor: pointer;
    }

    .search-overlay input {
      width: 90%;
      max-width: 560px;
      font-size: 28px;
      border: none;
      border-bottom: 2px solid #111;
      outline: none;
      padding: 14px 0;
      text-align: center;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1180px) {
      .shop-shell {
        grid-template-columns: 230px minmax(0, 1fr);
        column-gap: 40px;
      }

      .products-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 42px 28px;
      }

      .product-card,
      .product-card-inner {
        width: 100%;
      }
    }

    @media (max-width: 1060px) {
      .shop-shell {
        max-width: none;
        padding: 8px 34px 30px;
        grid-template-columns: 210px minmax(0, 1fr);
        column-gap: 34px;
      }

      .scent-list {
        max-width: 210px;
      }

      .breadcrumb {
        margin-bottom: 96px;
      }

      .shop-banner {
        height: 120px;
        margin-bottom: 38px;
      }

      .products-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 38px 22px;
      }

      .product-card,
      .product-card-inner {
        width: 100%;
      }

      .product-popup {
        width: 210px;
      }

      .product-card-inner {
        height: 175px;
        padding: 26px;
      }

      .product-info {
        min-height: 136px;
      }

      .product-name {
        min-height: 44px;
        font-size: 20px;
      }

      .product-type,
      .product-price {
        font-size: 19px;
      }

      .product-type {
        min-height: 42px;
      }

      .btn-cart {
        width: min(190px, 92%);
        height: 42px;
        font-size: 23px;
      }
    }

    @media (max-width: 900px) {
      .shop-shell {
        grid-template-columns: 1fr;
        padding: 8px 24px 28px;
      }

      .breadcrumb {
        margin-bottom: 28px;
      }

      .scent-list {
        max-width: none;
        margin-bottom: 30px;
      }

      .products-grid {
        grid-template-columns: repeat(2, 240px);
        justify-content: center;
        gap: 42px 24px;
      }

      .product-card,
      .product-card-inner {
        width: 240px;
      }

      .product-card-inner {
        height: 210px;
      }
    }

    @media (max-width: 760px) {
      .navbar {
        height: auto;
        min-height: 104px;
        padding: 16px 18px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        justify-items: center;
      }

      .nav-left {
        gap: 16px;
        order: 2;
      }

      .nav-left a {
        font-size: 15px;
      }

      .nav-logo {
        position: static;
        transform: none;
        grid-column: 1 / -1;
        justify-self: center;
        font-size: 28px;
        order: 1;
      }

      .nav-right {
        order: 2;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .nav-search {
        display: none;
      }

      .shop-shell {
        padding: 0 18px 32px;
      }

      .shop-banner {
        height: 92px;
        margin-bottom: 30px;
      }

      .products-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-width: 560px;
        margin: 0 auto;
        justify-items: center;
        gap: 36px 18px;
      }

      .product-card,
      .product-card-inner {
        width: 100%;
      }

      .product-card-inner {
        height: 230px;
      }

      .product-name {
        font-size: 22px;
      }

      .product-type,
      .product-price {
        font-size: 20px;
      }

      .btn-cart {
        height: 44px;
        font-size: 23px;
      }

      .scent-list a {
        height: 48px;
        font-size: 20px;
      }

      .results-count {
        font-size: 19px;
      }
    }

    @media (max-width: 520px) {
      .products-grid {
        grid-template-columns: 1fr;
        max-width: 280px;
      }

      .product-popup {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="shop.html" class="active">Shop</a>
      <a href="shop.html?sale=1">Sale</a>
    </div>

    <a href="index.html" class="nav-logo">Scentique</a>

    <div class="nav-right">
      <button class="nav-search" id="openSearch">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" placeholder="Search Perfume" readonly />
      </button>

      <button class="nav-icon" id="aiChatButton" title="AI chatbox" aria-label="Open AI chatbox">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M7 13H5a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3h-3l-4 4v-4Z"></path>
          <path d="M16 8h3a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3h-1v3l-3-3h-4a3 3 0 0 1-3-3v-1"></path>
        </svg>
      </button>

      <a href="account.html" class="nav-icon" title="Account">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
        </svg>
      </a>

      <a href="cart.html" class="nav-icon" title="Cart">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        <span class="cart-badge" aria-label="Cart item count"></span>
      </a>
    </div>
  </nav>

  <main class="shop-shell">
    <aside class="shop-sidebar" aria-label="Shop filters">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span>/</span>
        <a href="shop.html?cat=him" data-cat="him">For Him</a>
        <span>/</span>
        <a href="shop.html?cat=her" data-cat="her">For Her</a>
      </div>

      <ul class="scent-list">
        <li><a href="shop.html?scent=musk">Musk</a></li>
        <li><a href="shop.html?scent=fresh">Fresh</a></li>
        <li><a href="shop.html?scent=floral">Floral</a></li>
        <li><a href="shop.html?scent=woody">Woody</a></li>
        <li><a href="shop.html?scent=amber">Amber</a></li>
        <li><a href="shop.html?scent=spices">Spices</a></li>
      </ul>
    </aside>

    <section class="shop-content" aria-label="Products">
      <div class="shop-banner">
        <img src="shop-banner-reference.png" alt="Fresh perfume collection" />
      </div>

      <div class="products-grid" id="productsGrid">
        <p class="status-message">Loading products...</p>
      </div>

      <p class="results-count" id="resultsCount"></p>
    </section>
  </main>

  <!-- SEARCH OVERLAY -->
  <div class="search-overlay" id="searchOverlay">
    <span class="search-close" id="searchClose">✕</span>
    <input type="text" id="searchInput" placeholder="Search perfumes..." />
  </div>

  <aside class="chat-widget" id="chatWidget" aria-label="AI chatbox">
    <div class="chat-head">
      <span>Scentique AI</span>
      <button class="chat-close" id="chatClose" aria-label="Close chatbox">×</button>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="chat-message bot">Hi, I can help you choose a perfume by scent, budget, or occasion.</div>
    </div>
    <form class="chat-form" id="chatForm">
      <input type="text" id="chatInput" placeholder="Ask about perfumes..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </aside>

  <script>
    let PRODUCTS = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function productOriginalPrice(product) {
      return Number(product.original_price || product.price || 0);
    }

    function productSalePrice(product) {
      return Number(product.sale_price || product.price || 0);
    }

    function productDiscount(product) {
      const original = productOriginalPrice(product);
      const salePrice = productSalePrice(product);
      const storedDiscount = Number(product.discount_percentage || 0);

      if (storedDiscount > 0) return Math.round(storedDiscount);
      if (original > 0 && salePrice < original) return Math.round(((original - salePrice) / original) * 100);
      return 0;
    }

    function productPriceHtml(product) {
      const isSale = product.sale === true || product.sale === 1;
      const original = productOriginalPrice(product);
      const salePrice = productSalePrice(product);
      const discount = productDiscount(product);

      if (!isSale) {
        return `<div class="product-price">RM${escapeHtml(original)}</div>`;
      }

      return `
        <div class="product-price sale-price">
          <span class="product-price-old">RM${escapeHtml(original)}</span>
          <span class="product-price-new">RM${escapeHtml(salePrice)}</span>
          <span class="discount-badge">${escapeHtml(discount)}% off</span>
        </div>
      `;
    }

    async function apiFetch(path, options) {
      if (window.location.protocol !== "file:") {
        return fetch(path, options);
      }

      try {
        return await fetch(`http://127.0.0.1:3000${path}`, options);
      } catch (error) {
        return fetch(`http://localhost:3000${path}`, options);
      }
    }

    function getCartCount() {
      const cart = JSON.parse(localStorage.getItem("scentique_cart") || "[]");
      return cart.reduce((total, item) => total + Number(item.qty || item.quantity || 1), 0);
    }

    function syncCartBadge() {
      const count = getCartCount();
      document.querySelectorAll(".cart-badge").forEach(badge => {
        badge.textContent = count > 99 ? "99+" : count;
        badge.classList.toggle("show", count > 0);
      });
    }

    function getCurrentUser() {
      return JSON.parse(localStorage.getItem("scentique_session") || "null");
    }

    function requireCustomerLogin() {
      if (localStorage.getItem("scentique_admin_session") === "active") {
        alert("Admin accounts are only for managing orders and products. Please logout from admin before shopping.");
        window.location.href = "admin.html";
        return false;
      }

      const user = getCurrentUser();
      if (user && user.id) return true;
      alert("Please login first before adding perfume to cart.");
      window.location.href = `Login.html?next=${encodeURIComponent(window.location.pathname.split("/").pop() + window.location.search)}`;
      return false;
    }

    async function loadProducts() {
      const grid = document.getElementById("productsGrid");
      const resultsCount = document.getElementById("resultsCount");

      try {
        const response = await apiFetch("/api/products");

        if (!response.ok) {
          throw new Error("Failed to fetch products");
        }

        PRODUCTS = await response.json();

        console.log("Products from backend:", PRODUCTS);

        renderProducts(getSearchQuery());
      } catch (error) {
        console.error("Product loading error:", error);

        grid.innerHTML = `
          <p class="status-message">
            Failed to load products. Make sure your backend is running on localhost:3000.
          </p>
        `;
        resultsCount.textContent = "";
      }
    }

    function getCurrentCategory() {
      const params = new URLSearchParams(window.location.search);

      /*
        Default is all, so http://localhost:3000/shop.html
        will show every product from backend.
      */
      return params.get("cat") || "all";
    }

    function updateBreadcrumbActive(category) {
      document.querySelectorAll(".breadcrumb a[data-cat]").forEach(link => {
        link.classList.toggle("active", link.dataset.cat === category);
      });
    }

    function getSearchQuery() {
      return (new URLSearchParams(window.location.search).get("q") || "").trim();
    }

    function renderProducts(searchValue = "") {
      const grid = document.getElementById("productsGrid");
      const params = new URLSearchParams(window.location.search);
      const activeSearchValue = searchValue || getSearchQuery();

      const currentCat = getCurrentCategory();
      updateBreadcrumbActive(currentCat);
      const saleOnly = params.get("sale") === "1";
      const scent = (params.get("scent") || "").toLowerCase();

      document.querySelectorAll(".scent-list a").forEach(link => {
        const linkScent = new URL(link.href).searchParams.get("scent");
        link.classList.toggle("active", Boolean(scent) && linkScent === scent);
      });

      let list = PRODUCTS.filter(product => {
        const productName = product.name || "";
        const productType = product.type || "";
        const productCategory = product.category || "";
        const productScent = product.scent || "";
        const productDescription = product.description || "";
        const productNotes = product.notes || "";
        const productSale = product.sale === true || product.sale === 1;

        const matchCategory =
          currentCat === "all" || productCategory === currentCat;

        const matchSale =
          !saleOnly || productSale;

        const matchSearch =
          productName.toLowerCase().includes(activeSearchValue.toLowerCase()) ||
          productType.toLowerCase().includes(activeSearchValue.toLowerCase());

        const scentText = `${productName} ${productType} ${productCategory} ${productScent} ${productDescription} ${productNotes}`.toLowerCase();
        const matchScent =
          !scent ||
          productScent.toLowerCase() === scent ||
          scentText.includes(scent);

        return matchCategory && matchSale && matchSearch && matchScent;
      });

      console.log("Products shown on shop:", list);
      document.getElementById("resultsCount").textContent =
        activeSearchValue
          ? `Search results for "${escapeHtml(activeSearchValue)}": ${list.length} of ${PRODUCTS.length} results.`
          : `You have viewed ${list.length} of ${PRODUCTS.length} results.`;

      if (list.length === 0) {
        grid.innerHTML = `
          <p class="status-message">
            No products found.
          </p>
        `;
        return;
      }

      grid.innerHTML = list.map(product => {
        const productImage = product.image || "https://via.placeholder.com/300x300?text=No+Image";
        const productName = product.name || "Unnamed Product";
        const productType = product.type || "No type";
        const productDescription = product.description || `${productName} is a ${productType} fragrance with a ${product.scent || "signature"} scent profile.`;
        const detailUrl = `product.html?id=${encodeURIComponent(product.id)}`;
        const stock = Number(product.stock ?? 0);
        const inStock = stock > 0;

        return `
          <div class="product-card">
            <a class="product-card-inner" href="${detailUrl}" aria-label="View ${escapeHtml(productName)} details">
              <img class="product-img" src="${escapeHtml(productImage)}" alt="${escapeHtml(productName)}" />
            </a>

            <div class="product-popup" role="tooltip">
              <strong>${escapeHtml(productName)}</strong>
              ${escapeHtml(productDescription)}
            </div>

            <div class="product-info">
              <a class="product-name" href="${detailUrl}">${escapeHtml(productName)}</a>
              <div class="product-type">${escapeHtml(productType)}</div>
              ${productPriceHtml(product)}
              <div class="product-stock ${inStock ? "" : "out"}">${inStock ? `${stock} in stock` : "Out of stock"}</div>
              <button class="btn-cart" onclick="addToCart('${product.id}', this)" ${inStock ? "" : "disabled"}>
                ${inStock ? "Add to cart" : "Out of stock"}
              </button>
            </div>
          </div>
        `;
      }).join("");
    }

    function addToCart(id, button) {
      if (!requireCustomerLogin()) return;

      const product = PRODUCTS.find(item => String(item.id) === String(id));

      if (!product) {
        alert("Product not found.");
        return;
      }

      const stock = Number(product.stock ?? 0);

      if (stock <= 0) {
        alert("Sorry, this perfume is out of stock.");
        if (button) {
          button.textContent = "Out of stock";
          button.disabled = true;
        }
        return;
      }

      let cart = JSON.parse(localStorage.getItem("scentique_cart")) || [];

      const existing = cart.find(item => String(item.id) === String(id));
      const currentQty = existing ? Number(existing.qty || existing.quantity || 0) : 0;

      if (currentQty >= stock) {
        alert(`Only ${stock} item(s) available in stock.`);
        return;
      }

      if (existing) {
        existing.qty = Number(existing.qty || existing.quantity || 0) + 1;
        existing.quantity = existing.qty;
        existing.price = productSalePrice(product);
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          type: product.type,
          price: productSalePrice(product),
          img: product.image,
          qty: 1,
          quantity: 1
        });
      }

      localStorage.setItem("scentique_cart", JSON.stringify(cart));
      syncCartBadge();

      button.textContent = "Added ✓";

      setTimeout(() => {
        button.textContent = "Add to cart";
      }, 1500);
    }

    /* ===== SEARCH OVERLAY ===== */
    const openSearch = document.getElementById("openSearch");
    const searchOverlay = document.getElementById("searchOverlay");
    const searchClose = document.getElementById("searchClose");
    const searchInput = document.getElementById("searchInput");
    searchInput.value = getSearchQuery();

    openSearch.addEventListener("click", () => {
      searchOverlay.classList.add("open");
      searchInput.focus();
    });

    searchClose.addEventListener("click", () => {
      searchOverlay.classList.remove("open");
      searchInput.value = "";
      renderProducts();
    });

    searchInput.addEventListener("input", () => {
      renderProducts(searchInput.value);
    });

    searchInput.addEventListener("keydown", event => {
      if (event.key === "Enter" && searchInput.value.trim()) {
        event.preventDefault();
        window.location.href = `shop.html?q=${encodeURIComponent(searchInput.value.trim())}`;
      }
    });

    const aiChatButton = document.getElementById("aiChatButton");
    const chatWidget = document.getElementById("chatWidget");
    const chatClose = document.getElementById("chatClose");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const chatBody = document.getElementById("chatBody");

    function addChatMessage(text, type) {
      const message = document.createElement("div");
      message.className = `chat-message ${type}`;
      message.textContent = text;
      chatBody.appendChild(message);
      chatBody.scrollTop = chatBody.scrollHeight;
      return message;
    }

    function getChatApiUrl() {
      return window.location.protocol === "file:"
        ? "http://localhost:3000/api/chat"
        : "/api/chat";
    }

    aiChatButton.addEventListener("click", () => {
      chatWidget.classList.toggle("open");
      if (chatWidget.classList.contains("open")) {
        chatInput.focus();
      }
    });

    chatClose.addEventListener("click", () => {
      chatWidget.classList.remove("open");
    });

    chatForm.addEventListener("submit", async event => {
      event.preventDefault();
      const question = chatInput.value.trim();
      if (!question) return;

      addChatMessage(question, "user");
      chatInput.value = "";

      const typingMessage = addChatMessage("Typing...", "bot");

      try {
        const response = await fetch(getChatApiUrl(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: question })
        });

        const data = await response.json();
        typingMessage.textContent = data.reply || "Sorry, I could not answer that.";
      } catch (error) {
        typingMessage.textContent = "Please run npm start first so the AI chat can connect.";
      }
    });

    loadProducts();
    syncCartBadge();
  </script>

</body>
</html>
